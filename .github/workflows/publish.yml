on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::tibble

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2

      - name: Resolve rendered output directory
        run: |
          if [ -d "_book" ]; then
            echo "QUARTO_OUTPUT=./_book" >> "$GITHUB_ENV"
          elif [ -d "_site" ]; then
            echo "QUARTO_OUTPUT=./_site" >> "$GITHUB_ENV"
          else
            mkdir -p _site
            shopt -s nullglob
            html_files=( *.html )
            if [ ${#html_files[@]} -gt 0 ]; then
              cp "${html_files[@]}" _site/
              echo "QUARTO_OUTPUT=./_site" >> "$GITHUB_ENV"
            else
              echo "No rendered output directory (_site/_book) or root HTML files found."
              exit 1
            fi
          fi

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.QUARTO_OUTPUT }}/
          clean-exclude: pr-preview/
          force: false
